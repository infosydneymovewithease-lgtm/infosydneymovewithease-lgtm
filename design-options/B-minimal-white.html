<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案B · 极简白</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
body { font-family: -apple-system, 'PingFang SC', sans-serif; background: #ffffff; max-width: 430px; margin: 0 auto; min-height: 100vh; }

.topbar { background: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f2f2f2; }
.brand { font-size: 16px; font-weight: 900; color: #1d1d1f; letter-spacing: -0.5px; }
.brand span { color: #dc2626; }
.call-btn { background: #f5f5f7; color: #1d1d1f; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; border: none; }

.hero { padding: 36px 20px 28px; background: white; }
.hero-sub { font-size: 12px; font-weight: 600; color: #dc2626; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
.hero h1 { font-size: 30px; font-weight: 900; color: #1d1d1f; line-height: 1.15; margin-bottom: 10px; letter-spacing: -1px; }
.hero p { font-size: 14px; color: #6e6e73; line-height: 1.6; margin-bottom: 28px; }
.btn-row { display: flex; gap: 10px; }
.btn-primary { flex: 1; background: #dc2626; color: white; font-weight: 700; padding: 16px; border-radius: 14px; border: none; font-size: 15px; letter-spacing: -0.3px; }
.btn-call { background: #f5f5f7; color: #1d1d1f; font-weight: 600; padding: 16px 20px; border-radius: 14px; border: none; font-size: 14px; }

.trust { background: #f5f5f7; padding: 16px 20px; display: grid; grid-template-columns: repeat(4,1fr); gap: 4px; }
.trust-item { text-align: center; }
.trust-val { font-size: 16px; font-weight: 800; color: #1d1d1f; }
.trust-lbl { font-size: 10px; color: #86868b; margin-top: 2px; }

.sec { padding: 24px 20px; }
.sec-title { font-size: 13px; font-weight: 800; color: #1d1d1f; margin-bottom: 16px; }

/* Moving: horizontal card, minimal */
.move-card { background: #f5f5f7; border-radius: 20px; padding: 20px; margin-bottom: 14px; display: flex; align-items: center; gap: 16px; }
.move-icon-box { width: 52px; height: 52px; background: #dc2626; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.move-info h3 { font-size: 17px; font-weight: 800; color: #1d1d1f; }
.move-info p { font-size: 12px; color: #86868b; margin-top: 2px; }
.move-price { margin-left: auto; text-align: right; }
.move-price strong { font-size: 20px; font-weight: 900; color: #1d1d1f; }
.move-price span { font-size: 11px; color: #86868b; display: block; }
.move-badge { background: #dc2626; color: white; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 6px; display: inline-block; margin-bottom: 4px; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.svc-card { background: #f5f5f7; border-radius: 18px; padding: 18px 16px; }
.svc-icon { font-size: 26px; margin-bottom: 10px; }
.svc-name { font-size: 14px; font-weight: 700; color: #1d1d1f; }
.svc-desc { font-size: 11px; color: #86868b; margin-top: 3px; line-height: 1.4; }
.svc-arrow { font-size: 11px; color: #dc2626; font-weight: 600; margin-top: 10px; }

.divider { height: 8px; background: #f5f5f7; margin: 4px 0; }

.why-item { display: flex; align-items: center; gap: 14px; padding: 16px 20px; border-bottom: 1px solid #f5f5f7; }
.why-icon { font-size: 22px; flex-shrink: 0; }
.why-title { font-size: 14px; font-weight: 700; color: #1d1d1f; }
.why-desc { font-size: 12px; color: #86868b; margin-top: 2px; }
.spacer { height: 100px; }

.bottom-cta { position: fixed; bottom: 0; left: 0; right: 0; max-width: 430px; margin: 0 auto; background: white; border-top: 1px solid #f2f2f2; padding: 12px 16px 28px; display: flex; gap: 10px; }
.cta-call { flex: 1; background: #f5f5f7; color: #1d1d1f; font-weight: 700; padding: 15px; border-radius: 14px; border: none; font-size: 14px; }
.cta-book { flex: 1.5; background: #dc2626; color: white; font-weight: 800; padding: 15px; border-radius: 14px; border: none; font-size: 14px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">迁喜搬家 <span>·</span> Move With Ease</div>
  <button class="call-btn">联系我们</button>
</div>

<div class="hero">
  <div class="hero-sub">悉尼华人搬家</div>
  <h1>搬家从未<br>如此简单</h1>
  <p>专业团队，全程保障<br>中英双语，7天随约服务</p>
  <div class="btn-row">
    <button class="btn-primary">立即预约 →</button>
    <button class="btn-call">📞 致电</button>
  </div>
</div>

<div class="trust">
  <div class="trust-item"><div class="trust-val">98%</div><div class="trust-lbl">好评率</div></div>
  <div class="trust-item"><div class="trust-val">2000+</div><div class="trust-lbl">订单</div></div>
  <div class="trust-item"><div class="trust-val">悉尼</div><div class="trust-lbl">全区</div></div>
  <div class="trust-item"><div class="trust-val">保险</div><div class="trust-lbl">全程</div></div>
</div>

<div class="sec">
  <div class="sec-title">服务项目</div>
  <div class="move-card">
    <div class="move-icon-box">🚛</div>
    <div class="move-info">
      <div class="move-badge">最热门</div>
      <h3>搬家搬运</h3>
      <p>面包车 / 小卡车 / 大卡车</p>
    </div>
    <div class="move-price">
      <strong>$60</strong>
      <span>/h起</span>
    </div>
  </div>
  <div class="grid2">
    <div class="svc-card"><div class="svc-icon">🛋️</div><div class="svc-name">IKEA 安装</div><div class="svc-desc">代购提货 · 专业安装</div><div class="svc-arrow">预约 ›</div></div>
    <div class="svc-card"><div class="svc-icon">📦</div><div class="svc-name">物品寄存</div><div class="svc-desc">按周计费 · 灵活</div><div class="svc-arrow">预约 ›</div></div>
    <div class="svc-card"><div class="svc-icon">✨</div><div class="svc-name">清洁服务</div><div class="svc-desc">交房验房</div><div class="svc-arrow">预约 ›</div></div>
    <div class="svc-card"><div class="svc-icon">♻️</div><div class="svc-name">二手物品</div><div class="svc-desc">优质二手</div><div class="svc-arrow">浏览 ›</div></div>
  </div>
</div>

<div class="divider"></div>
<div class="why-item"><span class="why-icon">🏆</span><div><div class="why-title">专业团队</div><div class="why-desc">多年经验，物品零损坏</div></div></div>
<div class="why-item"><span class="why-icon">💬</span><div><div class="why-title">中英双语</div><div class="why-desc">华人团队，沟通无障碍</div></div></div>
<div class="why-item"><span class="why-icon">📅</span><div><div class="why-title">7天随约</div><div class="why-desc">急搬也能安排</div></div></div>
<div class="why-item"><span class="why-icon">🔒</span><div><div class="why-title">全程保险</div><div class="why-desc">正规运营，安心无忧</div></div></div>
<div class="spacer"></div>

<div class="bottom-cta">
  <button class="cta-call">📞 致电</button>
  <button class="cta-book">立即预约搬家</button>
</div>
</body>
</html>
